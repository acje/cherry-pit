# adr-fmt configuration
#
# Single machine-readable source for domain definitions, crate mappings,
# stale directory config, and validation rules.
#
# Referenced by GOVERNANCE.md §13.

[stale]
directory = "stale"

# ── Domain definitions ──────────────────────────────────────────────

[[domains]]
prefix = "COM"
name = "Common Domain"
directory = "common"
description = """\
    Cross-cutting software design principles informed by Ousterhout's \
    A Philosophy of Software Design. Technology-agnostic guidance on \
    module depth, complexity management, error design, and abstraction \
    layering. Distinct from Cherry's crate-specific architecture \
    decisions."""
crates = []

[[domains]]
prefix = "CHE"
name = "Cherry Domain"
directory = "cherry"
description = """\
    Design philosophy, EDA/DDD/hexagonal architecture, domain model \
    traits (aggregates, commands, events, policies), infrastructure \
    ports, concurrency, delivery, storage backends, workspace tooling, \
    testing strategy, and build configuration."""
crates = [
    "cherry-pit-core",
    "cherry-pit-gateway",
    "cherry-pit-web",
    "cherry-pit-projection",
    "cherry-pit-agent",
]

[[domains]]
prefix = "PAR"
name = "Pardosa Domain"
directory = "pardosa"
description = """\
    EDA storage layer: fiber semantics, stream management, \
    NATS/JetStream transport, migration model, backpressure, and \
    single-writer fencing at transport level."""
crates = ["pardosa"]

[[domains]]
prefix = "GEN"
name = "Genome Domain"
directory = "genome"
description = """\
    Binary serialization format: wire layout, schema hashing, \
    zero-copy deserialization, compression, security limits (DoS \
    protection, decompression bombs), type validation, and forward \
    compatibility."""
crates = ["pardosa-genome", "pardosa-genome-derive"]

# ── Rule catalog ────────────────────────────────────────────────────
#
# All rules emit warnings. adr-fmt is advisory: exit 0 for lint
# findings, exit 1 only for infrastructure errors (missing config,
# no domains found).

# Template rules (T001–T015)

[[rules]]
id = "T001"
category = "template"
description = "H1 title present"

[[rules]]
id = "T002"
category = "template"
description = "Date field present"

[[rules]]
id = "T003"
category = "template"
description = "Last-reviewed field present (required for all tiers)"

[[rules]]
id = "T004"
category = "template"
description = "Tier field present"

[[rules]]
id = "T005"
category = "template"
description = "Status section with status line present"

[[rules]]
id = "T006"
category = "template"
description = "Status value is recognized; no parenthetical annotations"

[[rules]]
id = "T007"
category = "template"
description = "Related section has ≥1 relationship (no orphans, no placeholders)"

[[rules]]
id = "T008"
category = "template"
description = "Context section present"

[[rules]]
id = "T009"
category = "template"
description = "Decision section present"

[[rules]]
id = "T010"
category = "template"
description = "Consequences section present"

[[rules]]
id = "T011"
category = "template"
description = "Code block exceeds 20 lines"

[[rules]]
id = "T012"
category = "template"
description = "Amendment date >= creation date; valid ISO 8601"

[[rules]]
id = "T014"
category = "template"
description = "Section ordering: Status → Related → Context → Decision → Consequences (+ Retirement for stale)"

[[rules]]
id = "T015"
category = "template"
description = "Prose section below minimum word count"

[rules.params]
min_words = 10

# Link rules (L001–L009)

[[rules]]
id = "L001"
category = "link"
description = "Dangling link — target ADR not found in any domain"

[[rules]]
id = "L003"
category = "link"
description = "Supersedes verb without matching Superseded-by status on target"

[[rules]]
id = "L004"
category = "link"
description = "Cross-domain reference to unmigrated ADR"

[[rules]]
id = "L006"
category = "link"
description = "Legacy relationship verb used (Depends on, Extends, Illustrates, Contrasts with, Scoped by, or any reverse verb)"

[[rules]]
id = "L007"
category = "link"
description = "Stale reference — target ADR is in stale archive"

[[rules]]
id = "L008"
category = "link"
description = "Root verb target does not match the ADR's own ID (self-reference mismatch)"

[[rules]]
id = "L009"
category = "link"
description = "Root and References verbs coexist — Root ADRs may not also use References"

# Naming rules (N001–N004)

[[rules]]
id = "N001"
category = "naming"
description = "Filename matches PREFIX-NNNN-kebab-slug.md pattern"

[[rules]]
id = "N002"
category = "naming"
description = "Number in filename matches H1 title ID"

[[rules]]
id = "N003"
category = "naming"
description = "Slug is valid lowercase kebab-case"

[[rules]]
id = "N004"
category = "naming"
description = "Domain prefix not found in configuration"

# Structure rules (S004–S005)

[[rules]]
id = "S004"
category = "structure"
description = "Stale ADR missing required Retirement section (≥10 words)"

[[rules]]
id = "S005"
category = "structure"
description = "Active ADR has Retirement section (forbidden outside stale/)"

# Index rules (I001–I003)

[[rules]]
id = "I001"
category = "index"
description = "Domain README exists"

[[rules]]
id = "I002"
category = "index"
description = "Domain README lists all ADRs in domain"

[[rules]]
id = "I003"
category = "index"
description = "Domain README contains no links to non-existent ADRs"
